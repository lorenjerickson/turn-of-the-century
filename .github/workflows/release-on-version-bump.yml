name: Release On Version Bump

on:
  push:
    branches:
      - main
    paths:
      - system.json

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Detect version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          current_version="$(node -p "require('./system.json').version")"
          current_tag="v${current_version}"

          if git cat-file -e "${{ github.event.before }}:system.json" 2>/dev/null; then
            previous_version="$(git show "${{ github.event.before }}:system.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
          else
            previous_version=""
          fi

          if [[ -n "${previous_version}" && "${previous_version}" == "${current_version}" ]]; then
            echo "release_required=false" >> "$GITHUB_OUTPUT"
            echo "version=${current_version}" >> "$GITHUB_OUTPUT"
            echo "tag=${current_tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "release_required=true" >> "$GITHUB_OUTPUT"
          echo "version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${current_tag}" >> "$GITHUB_OUTPUT"

      - name: Build dist artifacts
        if: steps.version.outputs.release_required == 'true'
        run: bash scripts/release.sh

      - name: Create or update GitHub release
        if: steps.version.outputs.release_required == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          fail_on_unmatched_files: true
          files: |
            dist/*

      - name: Verify release assets
        if: steps.version.outputs.release_required == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          assets="$(gh release view "${{ steps.version.outputs.tag }}" --json assets --jq '.assets[].name')"
          for required_asset in system.json turn-of-the-century.zip; do
            if ! grep -qx "${required_asset}" <<< "${assets}"; then
              echo "Missing required release asset: ${required_asset}"
              echo "Uploaded assets:"
              echo "${assets}"
              exit 1
            fi
          done
